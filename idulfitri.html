<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idul Fitri Aesthetic</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at top, #0f5132, #021a0a);
    color:white;
    overflow:hidden;
}

/* CONTAINER */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* TEXT */
h1{font-size:clamp(22px,5vw,30px);}
p{opacity:0.8;}

/* UCAPAN */
.ucapan-box{
    margin:15px 0;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    min-height:80px;
    animation:fade 0.5s;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

/* MASJID */
.masjid{width:100%;margin:20px 0;}

/* KARAKTER */
.scene{position:relative;height:140px;}

.person{
    width:50px;height:90px;
    background:#ffd966;
    position:absolute;
    bottom:0;
    border-radius:10px;
}
.person::before{
    content:"";
    width:30px;height:30px;
    background:#ffe0bd;
    border-radius:50%;
    position:absolute;
    top:-20px;left:10px;
}

.left{left:-60px;animation:leftWalk 4s forwards;}
.right{right:-60px;animation:rightWalk 4s forwards;}

@keyframes leftWalk{to{left:35%;}}
@keyframes rightWalk{to{right:35%;}}

.hand{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    font-size:30px;
    opacity:0;
    animation:show 1s 4s forwards;
}

@keyframes show{to{opacity:1;}}

/* BUTTON */
button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
}

.ucapan{background:#6fbf4c;color:white;}
.thr{background:#ff4e50;color:white;}

button:hover{opacity:0.8;}

/* FIREWORK */
.spark{
    position:fixed;
    font-size:14px;
    animation:boom 1s forwards;
}
@keyframes boom{
    to{transform:scale(3);opacity:0;}
}

/* POPUP THR */
.thr-popup{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.thr-box{
    background:white;
    color:black;
    padding:25px;
    border-radius:20px;
    text-align:center;
    max-width:300px;
    animation:scaleUp 0.3s;
}

@keyframes scaleUp{
    from{transform:scale(0.7);}
    to{transform:scale(1);}
}

.thr-box button{
    margin-top:15px;
    padding:8px 15px;
    border:none;
    border-radius:10px;
    background:#ff4e50;
    color:white;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🌙 Selamat Idul Fitri</h1>
<p>Mohon Maaf Lahir dan Batin</p>

<div class="ucapan-box" id="ucapanBox">
✨ Minal aidin wal faidzin, mohon maaf lahir dan batin ✨
</div>

<!-- MASJID -->
<svg class="masjid" viewBox="0 0 200 100">
    <rect x="20" y="40" width="160" height="40" fill="#2ecc71"/>
    <polygon points="100,10 30,40 170,40" fill="#27ae60"/>
    <circle cx="100" cy="30" r="10" fill="#f1c40f"/>
</svg>

<!-- KARAKTER -->
<div class="scene">
    <div class="person left"></div>
    <div class="person right"></div>
    <div class="hand">🤝</div>
</div>

<button class="ucapan" onclick="gantiUcapan()">🎉 Ucapan Baru</button>
<button class="thr" onclick="thr()">💸 THR</button>

</div>
</div>

<!-- AUDIO -->
<audio id="audio" autoplay loop>
    <source src="TAKBIRAN CUYY.mp3" type="audio/mpeg">
</audio>

<script>

// UCAPAN
const list = [
"✨ Minal aidin wal faidzin, mohon maaf lahir dan batin",
"🕌 Taqabbalallahu minna wa minkum",
"🌙 Semoga kita kembali fitrah",
"💚 Maafkan segala khilaf",
"🎊 Semoga bahagia selalu",
"🤲 Semoga dosa diampuni",
"⭐ Awal baru yang lebih baik",
"🏮 Silaturahmi makin erat"
];

function gantiUcapan(){
    let r = list[Math.floor(Math.random()*list.length)];
    let box = document.getElementById("ucapanBox");
    box.style.animation="none";
    setTimeout(()=>{
        box.innerHTML=r;
        box.style.animation="fade 0.5s";
    },10);
}

// AUDIO AUTO FIX
window.addEventListener("load", () => {
    let a = document.getElementById("audio");
    a.volume = 0.6;

    let play = a.play();
    if (play !== undefined) {
        play.catch(() => {
            document.body.addEventListener("click", () => {
                a.play();
            }, { once: true });
        });
    }
});

// THR MODERN
function thr(){
    const msg=[
        "💸 THR dulu dong 😭",
        "😂 THR wajib ya!",
        "😎 Udah maafan, THR mana?",
        "🏮 THR = Tradisi!",
        "🤲 Biar berkah, bagi THR 😆"
    ];

    let popup=document.createElement("div");
    popup.className="thr-popup";

    popup.innerHTML=`
        <div class="thr-box">
            <h2>😂 THR MODE</h2>
            <p>${msg[Math.floor(Math.random()*msg.length)]}</p>
            <button onclick="this.closest('.thr-popup').remove()">Tutup</button>
        </div>
    `;

    document.body.appendChild(popup);
}

// FIREWORK
setInterval(()=>{
    let s=document.createElement("div");
    s.className="spark";
    s.innerHTML="✨";
    s.style.left=Math.random()*window.innerWidth+"px";
    s.style.top=Math.random()*window.innerHeight+"px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
},700);

</script>

</body>
</html>
